<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>防衛大学校オープンキャンパス 予定表（7/17〜7/19）</title>
<style>
/* ============================================================
   表示層のスタイル（外部フォント・外部画像は一切なし）
   ============================================================ */
:root{
  --navy:#0E2340;
  --navy2:#1B3A63;
  --sea:#2E7FB8;
  --sea-lt:#DCEBF5;
  --paper:#F6F8FA;
  --card:#FFFFFF;
  --ink:#12202F;
  --ink-soft:#54677C;
  --line:#D8E1EA;
  --amber:#C97C10;
  --amber-lt:#FDF2DD;
  --alert:#B03A30;
  --alert-lt:#FBE9E7;
  --ok:#1E7A54;
  --radius:14px;
  --tap:60px;
  --font: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Noto Sans JP", "Yu Gothic UI", Meiryo, sans-serif;
  --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Courier New", monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:var(--font);
  background:var(--paper);
  color:var(--ink);
  font-size:17px;
  line-height:1.6;
  padding-bottom:40px;
  -webkit-text-size-adjust:100%;
}
.wrap{max-width:640px;margin:0 auto;padding:0 12px}

/* ---- ヘッダー ---- */
header{
  background:var(--navy);
  color:#fff;
  padding:18px 0 16px;
  border-bottom:5px solid var(--sea);
}
header .wrap{display:block}
h1{font-size:20px;margin:0 0 4px;letter-spacing:.02em}
.h-sub{font-size:14px;color:#A9C4DC;margin:0}
.h-place{font-size:13px;color:#8FAECB;margin:6px 0 0}

/* ---- 注意バナー ---- */
.banner{
  background:var(--amber-lt);
  border:1px solid #EBD4A2;
  border-left:6px solid var(--amber);
  border-radius:10px;
  padding:12px 14px;
  margin:14px 0;
  font-size:15px;
}
.banner b{color:var(--amber)}
.banner.alert{background:var(--alert-lt);border-color:#F0C3BE;border-left-color:var(--alert)}
.banner.alert b{color:var(--alert)}

/* ---- 日付タブ ---- */
.tabs{display:flex;gap:8px;margin:14px 0 12px}
.tab{
  flex:1;min-height:var(--tap);
  border:2px solid var(--line);
  background:var(--card);
  border-radius:var(--radius);
  font-family:var(--font);
  font-size:17px;font-weight:700;color:var(--ink-soft);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;padding:6px 2px;
}
.tab small{display:block;font-size:12px;font-weight:600;opacity:.8;margin-top:2px}
.tab[aria-selected="true"]{
  background:var(--navy);border-color:var(--navy);color:#fff;
}
.tab[aria-selected="true"] small{color:#A9C4DC;opacity:1}
.tab:focus-visible{outline:3px solid var(--sea);outline-offset:2px}

/* ---- カード共通 ---- */
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  margin:12px 0;
  overflow:hidden;
}
.card > h2{
  margin:0;padding:12px 14px;
  font-size:15px;letter-spacing:.04em;
  background:var(--sea-lt);color:var(--navy2);
  border-bottom:1px solid var(--line);
}
.card .body{padding:12px 14px}

/* ---- プラン選択 ---- */
.plan-list{display:flex;flex-direction:column;gap:8px}
.plan{
  display:flex;align-items:flex-start;gap:12px;
  min-height:var(--tap);
  border:2px solid var(--line);border-radius:12px;
  padding:12px;cursor:pointer;background:#fff;
}
.plan input{
  width:26px;height:26px;margin:2px 0 0;flex:none;accent-color:var(--sea);
}
.plan .pname{font-weight:700;font-size:17px;display:block}
.plan .pnote{font-size:14px;color:var(--ink-soft);display:block;margin-top:2px}
.plan.sel{border-color:var(--sea);background:#F3F9FD}

/* ---- 出発時刻プルダウン ---- */
.anchor{margin:0 0 12px}
.anchor:last-child{margin-bottom:0}
.anchor label{display:block;font-size:14px;font-weight:700;color:var(--navy2);margin-bottom:6px}
.anchor select{
  width:100%;min-height:var(--tap);
  font-family:var(--font);font-size:17px;
  padding:10px 12px;border:2px solid var(--sea);border-radius:12px;
  background:#fff;color:var(--ink);
}
.hint{font-size:13px;color:var(--ink-soft);margin:8px 0 0}

/* ---- 行程レール（このページの主役） ---- */
.rail{list-style:none;margin:0;padding:0}
.row{
  display:grid;
  grid-template-columns:74px 1fr 34px;
  gap:10px;
  align-items:start;
  padding:12px 14px;
  border-bottom:1px solid var(--line);
  min-height:var(--tap);
  cursor:pointer;
  position:relative;
}
.row:last-child{border-bottom:0}
.row .time{
  font-family:var(--mono);
  font-variant-numeric:tabular-nums;
  font-size:21px;font-weight:700;
  color:var(--navy);
  line-height:1.25;
  letter-spacing:-.02em;
  padding-top:1px;
}
.row .dur{display:block;font-family:var(--font);font-size:11px;font-weight:600;color:var(--ink-soft);letter-spacing:0}
.row .txt .t{font-weight:700;font-size:16px;display:block}
.row .txt .n{font-size:14px;color:var(--ink-soft);display:block;margin-top:3px}
.row .owner{
  display:inline-block;margin-top:6px;
  font-size:12px;font-weight:700;
  background:var(--sea-lt);color:var(--navy2);
  border-radius:999px;padding:2px 10px;
}
.row .owner.me{background:#E6F1E9;color:var(--ok)}
.row .owner.hero{background:var(--navy);color:#fff}
.row .owner.all{background:#EDE4F4;color:#5A3C7A}
.row .owner.sub{background:#EDF1F5;color:#7A8899}
.row input[type=checkbox]{
  width:30px;height:30px;margin:0;justify-self:end;flex:none;accent-color:var(--ok);
}
.row.done{background:#F4F7F4}
.row.done .txt .t{text-decoration:line-through;color:var(--ink-soft)}
.row.pin{background:#FFFBF2}
.row.pin .time{color:var(--amber)}
.row.pin::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--amber)}
.row .noclock{font-family:var(--font);font-size:13px;font-weight:700;color:var(--amber)}

.railwarn{
  margin:0;padding:11px 14px;
  background:var(--alert-lt);
  border-bottom:1px solid var(--line);
  border-left:6px solid var(--alert);
  font-size:14px;color:#7A2A22;font-weight:600;
}
.railwarn.soft{background:var(--amber-lt);border-left-color:var(--amber);color:#7A5210}

/* ---- 持ち物 ---- */
.pack{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--line);min-height:56px;cursor:pointer}
.pack:last-child{border-bottom:0}
.pack input{width:30px;height:30px;margin:0;flex:none;accent-color:var(--ok)}
.pack .pl{flex:1;font-size:16px}
.pack .pl small{display:block;font-size:13px;color:var(--ink-soft)}
.pack.done .pl{text-decoration:line-through;color:var(--ink-soft)}
.pack .owner{font-size:12px;font-weight:700;background:var(--sea-lt);color:var(--navy2);border-radius:999px;padding:2px 10px;flex:none}
.pack.star{background:#FFFBF2}

/* ---- 情報リスト ---- */
ul.facts{margin:0;padding-left:1.1em}
ul.facts li{margin:0 0 7px;font-size:15px}
.wx{display:flex;gap:8px}
.wx div{flex:1;text-align:center;border:1px solid var(--line);border-radius:10px;padding:8px 4px}
.wx .d{font-size:13px;font-weight:700;color:var(--navy2)}
.wx .s{font-size:14px;margin:3px 0}
.wx .t{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:14px;font-weight:700}
.wx .r{font-size:12px;color:var(--sea)}

/* ---- ボタン ---- */
.btnrow{display:flex;gap:10px;margin:16px 0 6px}
button.act{
  flex:1;min-height:var(--tap);
  font-family:var(--font);font-size:17px;font-weight:700;
  border-radius:12px;cursor:pointer;
}
#printBtn{background:var(--navy);color:#fff;border:2px solid var(--navy)}
#resetBtn{background:#fff;color:var(--alert);border:2px solid var(--line)}
button.act:focus-visible{outline:3px solid var(--sea);outline-offset:2px}
.foot{font-size:12px;color:var(--ink-soft);text-align:center;margin-top:16px;line-height:1.7}
.savemsg{font-size:13px;color:var(--ok);text-align:center;min-height:20px;margin-top:4px}
.savemsg.warn{color:var(--alert)}

/* ---- 印刷（A4・1枚） ---- */
@media print{
  @page{size:A4 portrait;margin:10mm}
  body{background:#fff;font-size:9pt;line-height:1.35;padding:0}
  .wrap{max-width:none;padding:0}
  header{background:#fff;color:#000;border-bottom:2px solid #000;padding:0 0 4px}
  h1{font-size:13pt}
  .h-sub,.h-place{color:#000;font-size:8pt}
  .noprint{display:none !important}
  .card{border:1px solid #999;border-radius:0;margin:5px 0;break-inside:avoid}
  .card > h2{background:#eee;color:#000;font-size:9pt;padding:3px 6px}
  .card .body{padding:5px 6px}
  .row{grid-template-columns:52px 1fr 14px;padding:2px 6px;min-height:0;border-bottom:1px dotted #bbb}
  .row .time{font-size:10pt}
  .row .dur{font-size:7pt}
  .row .txt .t{font-size:9pt}
  .row .txt .n{font-size:7.5pt}
  .row .owner{font-size:7pt;padding:0 5px;background:#eee;color:#000;margin-top:2px}
  .row input[type=checkbox]{width:11px;height:11px}
  .row.pin{background:#fff}
  .row.pin::before{display:none}
  .pack{padding:2px 6px;min-height:0;border-bottom:1px dotted #bbb}
  .pack input{width:11px;height:11px}
  .pack .pl{font-size:8.5pt}
  .pack .pl small{font-size:7pt}
  .pack .owner{font-size:7pt;background:#eee;color:#000}
  .pack.star{background:#fff}
  .banner{border:1px solid #666;border-left-width:3px;padding:4px 6px;margin:5px 0;font-size:8pt}
  ul.facts li{font-size:8pt;margin-bottom:2px}
  .wx div{padding:3px 2px}
  #packCard{columns:2;column-gap:8px}
  #packCard > h2{column-span:all}
}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <h1 id="ttl">防衛大学校 オープンキャンパス</h1>
    <p class="h-sub" id="sub">2026年7月17日（金）〜19日（日）</p>
    <p class="h-place" id="place"></p>
  </div>
</header>

<main class="wrap">

  <div class="banner alert" id="topAlert"></div>

  <!-- 日付タブ -->
  <div class="tabs noprint" id="tabs" role="tablist"></div>

  <!-- プラン -->

  <section class="card" id="packCard">

  <section class="card">

  <!-- 大事なこと -->
  <section class="card">

  <div class="btnrow noprint">
    <button class="act" id="printBtn" type="button">印刷する</button>

  </div>
  <p class="savemsg noprint" id="saveMsg"></p>

  <p class="foot">
    防衛大学校 入学試験課 046-841-3810<br>
    〒239-8686 神奈川県横須賀市走水1-10-20
  </p>
</main>

/* ============================================================
   【永続層】UI は localStorage を直接さわらない。
   store.load / store.save だけを使う。
   将来「共有版」にするときは、ここの実装を差し替えるだけ。
   ============================================================ */

/* インターフェース定義（実装は下の LocalStore） */
const Store = {
  async load(tripId) { throw new Error("not implemented"); },      // → { [itemId]: {checked, by, at} }
  async save(tripId, itemId, value) { throw new Error("not implemented"); } // → void
};

/* localStorage 実装。使えない環境ではメモリに落ちる（落ちない・消えない） */
const LocalStore = (function () {
  const KEY = (tripId) => "trip:" + tripId;
  const memory = Object.create(null);   // フォールバック用
  let usable = null;                    // null=未判定 / true / false

  function canUse() {
    if (usable !== null) return usable;
    try {
      const k = "__probe__";
      window.localStorage.setItem(k, "1");
      window.localStorage.removeItem(k);
      usable = true;
    } catch (e) {
      usable = false;
    }
    return usable;
  }

  function readAll(tripId) {
    if (!canUse()) return memory[tripId] ? Object.assign({}, memory[tripId]) : {};
    try {
      const raw = window.localStorage.getItem(KEY(tripId));
      if (!raw) return {};
      const obj = JSON.parse(raw);
      return (obj && typeof obj === "object") ? obj : {};
    } catch (e) {
      usable = false;                       // 壊れていたらメモリに切り替え
      return memory[tripId] ? Object.assign({}, memory[tripId]) : {};
    }
  }

  return {
    mode() { return canUse() ? "localStorage" : "memory"; },

    async load(tripId) {
      return readAll(tripId);
    },

    async save(tripId, itemId, value) {
      const all = readAll(tripId);
      if (value === null || value === undefined) delete all[itemId];
      else all[itemId] = value;

      memory[tripId] = all;                 // つねにメモリにも保持
      if (!canUse()) return;
      try {
        window.localStorage.setItem(KEY(tripId), JSON.stringify(all));
      } catch (e) {
        usable = false;                     // 容量オーバー等 → メモリのみ
      }
    },

    async clear(tripId) {
      memory[tripId] = {};
      if (!canUse()) return;
      try { window.localStorage.removeItem(KEY(tripId)); } catch (e) { usable = false; }
    }
  };
})();

/* ← 将来の「共有版」では、ここだけ差し替える */
const store = LocalStore;


/* ============================================================
   【表示層】store としか会話しない。localStorage を直接呼ばない。
   ============================================================ */
(function () {
  const $ = (id) => document.getElementById(id);

  const UI = {
    dayId: SCHEDULE.days[0].id,
    planId: SCHEDULE.plans[0].id,
    anchorTimes: {},   // { "d18|A|go": "08:00", ... }
    state: {}          // store から読んだチェック状態
  };

  /* ---- 時刻ユーティリティ ---- */
  const toMin = (hhmm) => {
    const p = String(hhmm).split(":");
    return (parseInt(p[0], 10) * 60) + parseInt(p[1], 10);
  };
  const toHHMM = (min) => {
    let m = ((min % 1440) + 1440) % 1440;
    const h = Math.floor(m / 60), mm = m % 60;
    return String(h).padStart(2, "0") + ":" + String(mm).padStart(2, "0");
  };
  const durLabel = (d) => {
    if (!d) return "";
    if (d < 60) return d + "分";
    const h = Math.floor(d / 60), m = d % 60;
    return m ? h + "時間" + m + "分" : h + "時間";
  };
  const ownerClass = (o) => {
    if (o.indexOf("三四郎") >= 0) return "hero";   // 三四郎が主役
    if (o === "みんな") return "all";
    if (o === "兄") return "sub";
    return "";                                     // 父母・父・母
  };
  const esc = (s) => String(s).replace(/[<>&]/g, (c) => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;" }[c]));

  const cur = () => {
    const day = SCHEDULE.days.find((d) => d.id === UI.dayId);
    return { day, block: day.byPlan[UI.planId] };
  };
  const akey = (anchorId) => UI.dayId + "|" + UI.planId + "|" + anchorId;

  function ensureAnchorDefaults() {
    SCHEDULE.days.forEach((day) => {
      SCHEDULE.plans.forEach((p) => {
        const b = day.byPlan[p.id];
        if (!b) return;
        b.anchors.forEach((a) => {
          const k = day.id + "|" + p.id + "|" + a.id;
          if (!UI.anchorTimes[k]) UI.anchorTimes[k] = a.default || a.options[0].t;
        });
      });
    });
  }

  /* ---- 描画 ---- */
  function renderHead() {
    $("ttl").textContent = SCHEDULE.title;
    $("sub").textContent = SCHEDULE.subtitle;
    $("place").textContent = SCHEDULE.place;
    $("topAlert").innerHTML = SCHEDULE.alert;
  }

  function renderTabs() {
    const box = $("tabs");
    box.innerHTML = "";
    SCHEDULE.days.forEach((d) => {
      const b = document.createElement("button");
      b.type = "button";
      b.className = "tab";
      b.setAttribute("role", "tab");
      b.setAttribute("aria-selected", d.id === UI.dayId ? "true" : "false");
      b.innerHTML = esc(d.label) + "<small>" + esc(d.dow) + "曜日</small>";
      b.addEventListener("click", () => { UI.dayId = d.id; renderAll(); window.scrollTo(0, 0); });
      box.appendChild(b);
    });
  }

  function renderPlans() {
    const box = $("planList");
    box.innerHTML = "";
    SCHEDULE.plans.forEach((p) => {
      const lab = document.createElement("label");
      lab.className = "plan" + (p.id === UI.planId ? " sel" : "");
      const r = document.createElement("input");
      r.type = "radio"; r.name = "plan"; r.value = p.id; r.checked = (p.id === UI.planId);
      r.addEventListener("change", () => { UI.planId = p.id; renderAll(); });
      const sp = document.createElement("span");
      sp.innerHTML = '<span class="pname">' + esc(p.name) + '</span><span class="pnote">' + esc(p.note) + "</span>";
      lab.appendChild(r); lab.appendChild(sp);
      box.appendChild(lab);
    });
  }

  function renderAnchors() {
    const { block } = cur();
    const box = $("anchorBox");
    box.innerHTML = "";
    block.anchors.forEach((a) => {
      const wrap = document.createElement("div");
      wrap.className = "anchor";
      const id = "sel_" + a.id;
      const lab = document.createElement("label");
      lab.setAttribute("for", id);
      lab.textContent = a.label;
      const sel = document.createElement("select");
      sel.id = id;
      a.options.forEach((o) => {
        const op = document.createElement("option");
        op.value = o.t;
        op.textContent = o.label || o.t;
        op.selected = (UI.anchorTimes[akey(a.id)] === o.t);
        sel.appendChild(op);
      });
      sel.addEventListener("change", () => {
        UI.anchorTimes[akey(a.id)] = sel.value;
        renderRail();   /* ← 変えると、その先の時刻が全部おしなおされる */
      });
      wrap.appendChild(lab); wrap.appendChild(sel);
      box.appendChild(wrap);
    });
    const h = document.createElement("p");
    h.className = "hint";
    h.textContent = "ここを変えると、下の予定の時間がぜんぶ計算しなおされます。";
    box.appendChild(h);
  }

  function renderRail() {
    const { block } = cur();
    $("dayTitle").textContent = block.title;

    const rows = block.items.map((it) => {
      const base = UI.anchorTimes[akey(it.anchor)];
      const start = toMin(base) + it.offset;
      return { it, start };
    }).sort((a, b) => a.start - b.start);

    /* 開催時間（10:30〜16:00）とのズレを検知して知らせる */
    const wbox = $("railWarn");
    wbox.innerHTML = "";
    if (SCHEDULE.ocWindow) {
      const oStart = toMin(SCHEDULE.ocWindow.start), oEnd = toMin(SCHEDULE.ocWindow.end);
      const entry = rows.find((r) => r.it.entry);
      const leave = rows.find((r) => r.it.leave);
      const msgs = [];
      if (entry && entry.start < oStart) {
        msgs.push({ soft: true, m: "受付は " + SCHEDULE.ocWindow.start + " から。" + toHHMM(entry.start) +
          " に着いても " + Math.round(oStart - entry.start) + "分 外で待つことになります。もう1本おそい出発でも大丈夫です。" });
      }
      if (leave && leave.start > oEnd) {
        msgs.push({ soft: false, m: "この出発だと、帰る時間が " + toHHMM(leave.start) + " になってしまいます。防大は " +
          SCHEDULE.ocWindow.end + " に閉まります。もっと早い電車にするか、下の予定をいくつか飛ばしてください。" });
      }
      msgs.forEach((x) => {
        const d = document.createElement("div");
        d.className = "railwarn" + (x.soft ? " soft" : "");
        d.textContent = x.m;
        wbox.appendChild(d);
      });
    }

    const ul = $("rail");
    ul.innerHTML = "";
    rows.forEach(({ it, start }) => {
      const li = document.createElement("li");
      const st = UI.state[it.id];
      const done = !!(st && st.checked);
      li.className = "row" + (done ? " done" : "") + (it.pin ? " pin" : "");

      const time = document.createElement("div");
      time.className = "time";
      time.innerHTML = (it.noclock
          ? '<span class="noclock">' + esc(it.clockLabel || "") + "</span>"
          : esc(toHHMM(start))) +
        (it.duration ? '<span class="dur">' + esc(durLabel(it.duration)) + "</span>" : "");

      const txt = document.createElement("div");
      txt.className = "txt";
      txt.innerHTML =
        '<span class="t">' + esc(it.title) + "</span>" +
        (it.note ? '<span class="n">' + esc(it.note) + "</span>" : "") +
        '<span class="owner ' + ownerClass(it.owner) + '">' + esc(it.owner) + "</span>";

      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = done;
      cb.setAttribute("aria-label", it.title);
      cb.addEventListener("click", (e) => e.stopPropagation());
      cb.addEventListener("change", () => toggle(it.id, it.owner, cb.checked));

      li.appendChild(time); li.appendChild(txt); li.appendChild(cb);
      li.addEventListener("click", () => { cb.checked = !cb.checked; toggle(it.id, it.owner, cb.checked); });
      ul.appendChild(li);
    });
  }

  function renderPacking() {
    const box = $("packList");
    box.innerHTML = "";
    SCHEDULE.packing.filter((p) => p.plans.indexOf(UI.planId) >= 0).forEach((p) => {
      const st = UI.state[p.id];
      const done = !!(st && st.checked);
      const row = document.createElement("div");
      row.className = "pack" + (done ? " done" : "") + (p.star ? " star" : "");

      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = done;
      cb.setAttribute("aria-label", p.label);
      cb.addEventListener("click", (e) => e.stopPropagation());
      cb.addEventListener("change", () => toggle(p.id, p.owner, cb.checked));

      const t = document.createElement("div");
      t.className = "pl";
      t.innerHTML = esc(p.label) + (p.note ? "<small>" + esc(p.note) + "</small>" : "");

      const o = document.createElement("span");
      o.className = "owner";
      o.textContent = p.owner;

      row.appendChild(cb); row.appendChild(t); row.appendChild(o);
      row.addEventListener("click", () => { cb.checked = !cb.checked; toggle(p.id, p.owner, cb.checked); });
      box.appendChild(row);
    });
  }

  function renderStatic() {
    const wx = $("wx");
    wx.innerHTML = "";
    SCHEDULE.weather.days.forEach((d) => {
      const el = document.createElement("div");
      el.innerHTML = '<div class="d">' + esc(d.d) + '</div><div class="s">' + esc(d.s) +
        '</div><div class="t">' + esc(d.t) + '</div><div class="r">' + esc(d.r) + "</div>";
      wx.appendChild(el);
    });
    $("wxNote").textContent = SCHEDULE.weather.note;

    const f = $("facts");
    f.innerHTML = "";
    SCHEDULE.facts.forEach((s) => {
      const li = document.createElement("li");
      li.innerHTML = s;
      f.appendChild(li);
    });
  }

  /* ---- 状態の読み書き（store 経由のみ） ---- */
  async function toggle(itemId, owner, checked) {
    const value = checked ? { checked: true, by: owner, at: new Date().toISOString() } : null;
    if (checked) UI.state[itemId] = value; else delete UI.state[itemId];
    renderRail(); renderPacking();
    try {
      await store.save(SCHEDULE.tripId, itemId, value);
      note(store.mode && store.mode() === "memory"
        ? "この端末では保存できないため、画面を閉じるとチェックは消えます"
        : "保存しました", store.mode && store.mode() === "memory");
    } catch (e) {
      note("保存できませんでした（チェックは画面上だけ残ります）", true);
    }
  }

  let noteTimer = null;
  function note(msg, warn) {
    const el = $("saveMsg");
    el.textContent = msg;
    el.className = "savemsg noprint" + (warn ? " warn" : "");
    clearTimeout(noteTimer);
    noteTimer = setTimeout(() => { el.textContent = ""; }, 2500);
  }

  function renderAll() {
    renderTabs(); renderPlans(); renderAnchors(); renderRail(); renderPacking();
  }

  async function boot() {
    renderHead();
    renderStatic();
    ensureAnchorDefaults();
    try {
      UI.state = await store.load(SCHEDULE.tripId) || {};
    } catch (e) {
      UI.state = {};
      note("前回のチェックを読み込めませんでした", true);
    }
    renderAll();

    $("printBtn").addEventListener("click", () => window.print());
    $("resetBtn").addEventListener("click", async () => {
      if (!window.confirm("チェックを全部消します。よろしいですか？")) return;
      UI.state = {};
      try {
        if (store.clear) await store.clear(SCHEDULE.tripId);
        else {
          const ids = SCHEDULE.packing.map((p) => p.id);
          SCHEDULE.days.forEach((d) => SCHEDULE.plans.forEach((p) => {
            const b = d.byPlan[p.id];
            if (b) b.items.forEach((i) => ids.push(i.id));
          }));
          for (const id of ids) await store.save(SCHEDULE.tripId, id, null);
        }
        note("消しました");
      } catch (e) {
        note("消せませんでした", true);
      }
      renderRail(); renderPacking();
    });
  }

  boot();
})();
</script>
</body>
</html>
